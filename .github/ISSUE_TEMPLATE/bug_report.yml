name: Bug logiciel
description: Comportement incorrect, régression ou défaut dans le code (backend, frontend, apps, firmware…)
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Merci de contribuer à la qualité Essensys. Décrivez le problème le plus précisément possible.
        Les signalements alimentent le [projet communautaire n°6](https://github.com/orgs/essensys-hub/projects/6).

  - type: dropdown
    id: component
    attributes:
      label: Composant concerné
      options:
        - Serveur backend (essensys-server-backend)
        - Interface web locale (essensys-server-frontend)
        - Portail distant (essensys-user-portal-*)
        - Gateway CM5 / Raspberry (essensys-raspberry-gateway)
        - Installation Ansible / déploiement
        - Application iOS
        - Application Android
        - Firmware / cartes Essensys
        - Site support (mon.essensys.fr)
        - Autre / je ne sais pas
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Gravité
      options:
        - Faible — contournement possible
        - Moyenne — fonction dégradée
        - Élevée — fonction principale indisponible
        - Critique — installation ou sécurité impactée
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version ou branche
      description: "Ex. V.1.3.0, main, commit court, version app"
      placeholder: "V.1.3.0"
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      description: Liste numérotée, du plus simple au plus complet
      placeholder: |
        1. Ouvrir …
        2. Cliquer sur …
        3. Observer …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportement observé
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environnement
      description: Matériel, OS, navigateur, réseau (LAN/WAN), gateway ou serveur classique
      placeholder: |
        - Raspberry Pi 4 / CM5 gateway
        - mon.essensys.local ou mon.essensys.fr
        - Chrome 136 / iOS 18 …
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs ou captures
      description: Extraits journal backend, Traefik, console navigateur, photos si matériel
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: J'ai consulté la documentation / dépannage avant d'ouvrir ce ticket
          required: false
        - label: Je peux fournir des informations complémentaires si demandé
          required: false
